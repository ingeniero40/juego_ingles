<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linguistic Quest | Memory Challenge</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Status Header -->
        <header class="status-header">
            <div class="status-badge timer">
                <i data-lucide="clock"></i>
                <span id="timer-display">00:00</span>
            </div>
            <div class="status-badge hits">
                <i data-lucide="check-circle"></i>
                <span id="hits-display">Hits: 0</span>
            </div>
            <div class="status-badge misses">
                <i data-lucide="alert-circle"></i>
                <span id="misses-display">Misses: 0</span>
            </div>
            <button id="help-btn" class="status-badge help" style="cursor: pointer; border: 2px solid var(--spark-amber-container); color: var(--spark-amber-base);">
                <i data-lucide="sparkles"></i>
                <span id="helps-display">Helps: 3</span>
            </button>
        </header>

        <!-- Simultaneous Boards -->
        <main class="boards-wrapper">
            <section class="board-column english">
                <h2 class="board-title">English</h2>
                <div class="game-grid-tray">
                    <div id="english-board" class="grid-container"></div>
                </div>
            </section>

            <section class="board-column spanish">
                <h2 class="board-title">Spanish</h2>
                <div class="game-grid-tray">
                    <div id="spanish-board" class="grid-container"></div>
                </div>
            </section>
        </main>

        <!-- Result Overlay -->
        <div id="result-overlay">
            <div class="result-card">
                <h2 style="color: var(--logic-blue-base); margin-bottom: 16px;">Victory!</h2>
                <div class="stats-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
                    <div class="stat-item">
                        <label style="display: block; font-size: 10px; color: #666;">TIME</label>
                        <span id="final-time" style="font-size: 20px; font-weight: 700;">00:00</span>
                    </div>
                    <div class="stat-item">
                        <label style="display: block; font-size: 10px; color: #666;">ACCURACY</label>
                        <span id="final-accuracy" style="font-size: 20px; font-weight: 700;">0%</span>
                    </div>
                </div>
                <button id="play-again" class="squishy-button">Play Again</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <i data-lucide="layout"></i>
            <span>Game Board</span>
        </a>
        <a href="#" class="nav-item">
            <i data-lucide="award"></i>
            <span>Results</span>
        </a>
    </nav>

    <script type="module" src="main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
