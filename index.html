<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linguistic Quest | Interactive Language Learning</title>
    <meta name="description" content="Master English vocabulary with our tactile, high-performance card matching game.">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Status Header -->
        <header class="status-header">
            <div class="status-badge timer" id="timer-badge">
                <i data-lucide="clock"></i>
                <span id="timer-display">00:00</span>
            </div>
            <div class="status-badge matches" id="matches-badge">
                <i data-lucide="check-circle"></i>
                <span id="matches-display">0 / 40</span>
            </div>
        </header>

        <!-- Board Toggle Button -->
        <button id="board-toggle" class="squishy-button">
            Translation Board
        </button>

        <!-- Game Boards -->
        <main id="game-container" class="game-grid-tray">
            <!-- English Board (Active by default) -->
            <div id="english-board" class="grid-container">
                <!-- Tiles will be injected here -->
            </div>
            
            <!-- Spanish Board (Hidden by default) -->
            <div id="spanish-board" class="grid-container hidden spanish-board">
                <!-- Tiles will be injected here -->
            </div>
        </main>

        <!-- Result Screen (Overlay) -->
        <div id="result-overlay" class="hidden">
            <div class="result-card">
                <h2>Well Done!</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <label>Time</label>
                        <span id="final-time">00:00</span>
                    </div>
                    <div class="stat-item">
                        <label>Accuracy</label>
                        <span id="final-accuracy">0%</span>
                    </div>
                    <div class="stat-item">
                        <label>XP Gained</label>
                        <span id="final-xp">+0</span>
                    </div>
                </div>
                <button id="play-again" class="squishy-button">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active" id="nav-menu">
            <i data-lucide="layout"></i>
            <span>Menu</span>
        </a>
        <a href="#" class="nav-item" id="nav-english">
            <i data-lucide="languages"></i>
            <span>English</span>
        </a>
        <a href="#" class="nav-item" id="nav-spanish">
            <i data-lucide="globe"></i>
            <span>Spanish</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script type="module" src="main.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
